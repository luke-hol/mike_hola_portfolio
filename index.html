<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luke's Portfolio</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f0f4f8;
      color: #333;
    }
    header { text-align: center; margin-bottom: 2rem; }
    h1 { color: #0066cc; }
    .theme-toggle { 
      position: fixed; top: 1rem; right: 1rem; 
      padding: 0.5rem 1rem; cursor: pointer; 
    }
  </style>
</head>
<body>
  <button class="theme-toggle">🌙 Dark Mode</button>

  <header>
    <h1>Welcome to My Portfolio</h1>
    <p>Learning web fundamentals → pen testing → side projects</p>
  </header>

  <section>
    <h2>About Me</h2>
    <p>I'm building a homelab to master the basics and break things responsibly.</p>
  </section>

  <script>
    const toggleBtn = document.querySelector('.theme-toggle');
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      toggleBtn.textContent = document.body.classList.contains('dark') 
        ? '☀️ Light Mode' : '🌙 Dark Mode';
    });
  </script>

  <style>
    body.dark {
      background: #121212;
      color: #e0e0e0;
    }
    body.dark h1 { color: #66b3ff; }
  </style>
</body>
</html>
